<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Topology Canvas</title>
    <style>
        body {
            background: var(--bg, #080c14);
            color: var(--fg, #e2e8f0);
        }
        body.light {
            --bg: #ffffff;
            --fg: #0f172a;
        }
        body.light #cy {
            background: #f8fafc;
        }
        body.light #statusbar {
            background: #f1f5f9;
            color: #475569;
            border-top: 1px solid #cbd5e1;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            font-family: Segoe UI, Consolas, monospace;
        }

        #cy {
            width: 100vw;
            height: calc(100vh - 40px);
            display: block;
            padding: 20px;
            box-sizing: border-box;
        }

        #statusbar {
            height: 40px;
            background: #161b26;
            border-top: 1px solid #2d3748;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-family: Consolas, monospace;
            font-size: 11px;
            color: #64748b;
            box-sizing: border-box;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/webcola/3.4.0/cola.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape-cola/2.5.1/cytoscape-cola.min.js"></script>
</head>
<body>
    <div id="cy"></div>
    <div id="statusbar">Waiting for discovery...</div>
    <script>
        function logToHost(tag, data) {
            try {
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage(JSON.stringify({
                        event: 'log',
                        tag: tag,
                        data: data || {}
                    }));
                }
            } catch (e) { /* ignore bridge errors */ }
        }

        console.log('[TopoCanvas] script loaded at', Date.now());
        logToHost('script-loaded', { ts: Date.now() });

        (function () {
            try {
                var colaLayout = {
                    name: 'cola',
                    animate: true,
                    animationDuration: 600,
                    randomize: true,
                    fit: true,
                    padding: 60,
                    nodeSpacing: function(node) {
                        var t = node.data('type');
                        // Compound nodes: zero (cola handles children spacing).
                        if (t === 'SubnetCloud') return 0;
                        // Hop chain: tight so consecutive hops sit close.
                        if (t === 'UnknownHop') return 30;
                        // Hosts: 60 so they spread inside the subnet box.
                        return 60;
                    },
                    edgeLength: function(edge) {
                        // ArpSeen edges LONG so hosts don't starburst around
                        // Self. TraceroutePath SHORT so the hop chain reads
                        // as a tight sequence. Structural edges medium.
                        var t = edge.data('type');
                        if (t === 'ArpSeen') return 180;
                        if (t === 'TraceroutePath') return 50;
                        return 120;
                    },
                    maxSimulationTime: 3000,
                    avoidOverlap: true,
                    handleDisconnected: true,
                    infinite: false,
                    flow: { axis: 'y', minSeparation: 50 }
                };

                var stylesheet = [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'text-valign': 'bottom',
                            'text-halign': 'center',
                            'font-size': '10px',
                            'color': '#94a3b8',
                            'text-wrap': 'wrap',
                            // Wide enough that "DESKTOP-HER186U\n192.168.41.186"
                            // renders as two lines without re-wrapping inside.
                            'text-max-width': '120px',
                            'text-margin-y': 4,
                            'border-width': 2,
                            'background-color': '#1f2937',
                            'border-color': '#475569'
                        }
                    },
                    {
                        selector: 'node[type="Self"]',
                        style: {
                            'shape': 'ellipse',
                            'width': 44,
                            'height': 44,
                            'background-color': '#ef4444',
                            'border-color': '#fca5a5',
                            'border-width': 2.5
                        }
                    },
                    {
                        selector: 'node[type="Gateway"]',
                        style: {
                            'shape': 'diamond',
                            'width': 40,
                            'height': 40,
                            'background-color': '#3b82f6',
                            'border-color': '#93c5fd',
                            'border-width': 2.5
                        }
                    },
                    {
                        selector: 'node[type="Host"]',
                        style: {
                            'shape': 'ellipse',
                            'width': 36,
                            'height': 36,
                            'background-color': '#22c55e',
                            'border-color': '#86efac',
                            'border-width': 2
                        }
                    },
                    {
                        // Readable labels for the densely-connected leaves
                        selector: 'node[type="Host"], node[type="Gateway"], node[type="RemoteHost"]',
                        style: {
                            'label': 'data(label)',
                            'text-valign': 'bottom',
                            'text-halign': 'center',
                            'text-margin-y': 6,
                            'font-size': 10,
                            'color': '#e2e8f0',
                            'text-outline-color': '#0f172a',
                            'text-outline-width': 2,
                            'text-background-color': '#0f172a',
                            'text-background-opacity': 0.75,
                            'text-background-padding': 3
                        }
                    },
                    {
                        selector: 'node[type="RemoteHost"]',
                        style: {
                            'shape': 'ellipse',
                            'width': 36,
                            'height': 36,
                            'background-color': '#155e75',
                            'border-color': '#06b6d4'
                        }
                    },
                    {
                        selector: 'node[type="SubnetCloud"]',
                        style: {
                            'shape': 'round-rectangle',
                            'background-opacity': 0,
                            'border-color': '#475569',
                            'border-width': 1,
                            'border-style': 'dashed',
                            'border-opacity': 0.5,
                            'padding': 40,
                            'label': 'data(label)',
                            'text-valign': 'top',
                            'text-halign': 'center',
                            'text-margin-y': -12,
                            'font-size': 11,
                            'color': '#64748b',
                            'font-weight': 'normal',
                            'text-wrap': 'wrap',
                            'text-max-width': 200,
                            'text-background-color': '#0f172a',
                            'text-background-opacity': 0.85,
                            'text-background-padding': 4
                        }
                    },
                    {
                        // Local NIC subnet — emerald "you are here" (border only)
                        selector: 'node[type="SubnetCloud"][isLocal="true"]',
                        style: {
                            'border-color': '#10b981',
                            'border-opacity': 0.7,
                            'color': '#34d399',
                            'background-opacity': 0
                        }
                    },
                    {
                        // Internet compound — amber dotted, ties to TraceroutePath edges
                        selector: 'node[type="SubnetCloud"][isInternet="true"]',
                        style: {
                            'border-color': '#f59e0b',
                            'border-opacity': 0.5,
                            'border-style': 'dotted',
                            'color': '#fbbf24',
                            'background-opacity': 0
                        }
                    },
                    {
                        selector: 'node[type="SubnetCloud"][expanded="true"]',
                        style: {
                            'border-color': '#2563eb',
                            'border-style': 'solid'
                        }
                    },
                    {
                        selector: 'node[type="SubnetCloud"][scanStatus="scanning"]',
                        style: {
                            'border-color': '#a78bfa',
                            'border-style': 'solid'
                        }
                    },
                    {
                        selector: 'node[type="SubnetCloud"][scanStatus="done"]',
                        style: {
                            'border-color': '#34d399',
                            'border-style': 'solid'
                        }
                    },
                    {
                        selector: 'node[type="SubnetCloud"][scanStatus="failed"]',
                        style: {
                            'border-color': '#f87171',
                            'border-style': 'solid'
                        }
                    },
                    {
                        selector: 'node[?stale]',
                        style: {
                            'opacity': 0.4,
                            'border-style': 'dashed',
                            'border-color': '#64748b'
                        }
                    },
                    {
                        selector: 'node[type="UnknownHop"]',
                        style: {
                            'shape': 'ellipse',
                            'width': 30,
                            'height': 30,
                            'background-color': '#475569',
                            'border-color': '#94a3b8',
                            'border-width': 1,
                            'label': 'data(label)',
                            'font-size': 9,
                            'color': '#cbd5e1',
                            'text-outline-color': '#0f172a',
                            'text-outline-width': 2,
                            'text-background-color': '#0f172a',
                            'text-background-opacity': 0.6,
                            'text-background-padding': 2
                        }
                    },
                    {
                        selector: 'node[status="reachable"]',
                        style: { 'border-color': '#34d399' }
                    },
                    {
                        selector: 'node[status="partial"]',
                        style: { 'border-color': '#f59e0b' }
                    },
                    {
                        selector: 'node[status="unreachable"]',
                        style: { 'border-color': '#f87171' }
                    },
                    {
                        selector: 'node[status="running"]',
                        style: { 'border-color': '#a78bfa' }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 1,
                            'line-color': '#2d3748',
                            'target-arrow-color': '#2d3748',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'opacity': 0.6
                        }
                    },
                    {
                        selector: 'edge[type="Flow"]',
                        style: {
                            'width': 'mapData(bytes, 0, 1000000, 1, 6)',
                            'line-color': '#1e3a5f',
                            'target-arrow-color': '#1e3a5f'
                        }
                    },
                    {
                        selector: 'edge[type="ArpSeen"]',
                        style: {
                            'line-color': '#64748b',
                            'line-style': 'dashed',
                            'line-dash-pattern': [4, 4],
                            'width': 1.2,
                            'opacity': 0.55,
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'none'
                        }
                    },
                    {
                        selector: 'edge[type="RouteHint"], edge[type="Structural"]',
                        style: {
                            'line-color': '#94a3b8',
                            'line-style': 'solid',
                            'width': 1.5,
                            'opacity': 0.7,
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'triangle',
                            'target-arrow-color': '#94a3b8'
                        }
                    },
                    {
                        selector: 'edge[type="TraceroutePath"]',
                        style: {
                            'line-color': '#f59e0b',
                            'target-arrow-color': '#f59e0b',
                            'line-style': 'solid',
                            'width': 2,
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'triangle',
                            'opacity': 0.8
                        }
                    },
                    {
                        selector: 'edge[type="SnmpNeighbor"]',
                        style: {
                            'line-color': '#2e1a3a',
                            'target-arrow-color': '#2e1a3a',
                            'line-style': 'dotted',
                            'width': 2
                        }
                    },
                    // Probed-host badge — placed BEFORE :selected so the amber
                    // selection ring overrides cyan when both apply (cytoscape
                    // uses last-rule-wins for matching selectors).
                    {
                        selector: 'node[lastProbedAt][type="Host"], node[lastProbedAt][type="Self"], node[lastProbedAt][type="Gateway"], node[lastProbedAt][type="RemoteHost"]',
                        style: {
                            'border-width': 3,
                            'border-color': '#06b6d4',
                            'border-opacity': 0.85
                        }
                    },
                    {
                        selector: 'node[lastProbeLevel="Advanced"][type="Host"], node[lastProbeLevel="Advanced"][type="Self"], node[lastProbeLevel="Advanced"][type="Gateway"], node[lastProbeLevel="Advanced"][type="RemoteHost"]',
                        style: {
                            'border-color': '#22d3ee',
                            'border-width': 3.5
                        }
                    },
                    {
                        selector: 'node:selected',
                        style: {
                            'border-width': 4,
                            'border-color': '#fbbf24',
                            'border-opacity': 0.9,
                            'overlay-color': '#fbbf24',
                            'overlay-opacity': 0.15,
                            'overlay-padding': 4
                        }
                    },
                    {
                        selector: 'edge:selected',
                        style: {
                            'line-color': '#ffffff',
                            'target-arrow-color': '#ffffff',
                            'opacity': 1
                        }
                    }
                ];

                var cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: [],
                    style: stylesheet,
                    wheelSensitivity: 0.2,
                    // Use cytoscape's native modifier behavior:
                    //   Shift+click → toggle node in/out of selection (additive)
                    //   Shift+drag  → box-select rectangle
                    // The tap handler below clears selection on plain click
                    // and treats Ctrl/Cmd as a dead modifier.
                    selectionType: 'additive',
                    boxSelectionEnabled: true,
                    autoungrabify: false,
                    autounselectify: false
                });

                window.cy = cy;
                logToHost('cy-ready', { cyType: typeof cy, hasLayout: !!cy.layout });

                function postToHost(obj) {
                    try {
                        if (window.chrome && window.chrome.webview) {
                            window.chrome.webview.postMessage(JSON.stringify(obj));
                        }
                    } catch (err) {
                        // ignore host bridge errors
                    }
                }

                // Centering helpers ─ keep the topology centered no matter when
                // the canvas finishes sizing or new nodes arrive.

                var FIT_PADDING = 50;

                // Defer initial fit until the WebView2-hosted #cy container
                // actually has non-zero dimensions. Cytoscape's fit() against
                // a zero-size viewport produces a zoom level of NaN/0 and the
                // graph appears in the corner instead of centered.
                function ensureSizedThenFit() {
                    var container = document.getElementById('cy');
                    if (!container) return;
                    var w = container.clientWidth;
                    var h = container.clientHeight;
                    if (w < 100 || h < 100) {
                        requestAnimationFrame(ensureSizedThenFit);
                        return;
                    }
                    try { cy.resize(); } catch (_) { }
                    try { cy.fit(undefined, FIT_PADDING); } catch (_) { }
                    logToHost('initial-fit-done', { w: w, h: h });
                }
                // Kick off as soon as cy exists; will retry until the host paints.
                requestAnimationFrame(ensureSizedThenFit);

                function safeFit() {
                    try { cy.resize(); } catch (_) { }
                    try { cy.fit(undefined, FIT_PADDING); } catch (_) { }
                }

                function runLayout(fitView) {
                    // After cola's simulation settles, run a deterministic
                    // fit() against the FINAL node positions — cola's own
                    // fit:true uses positions sampled mid-animation which
                    // isn't always centered.
                    try {
                        var opts = Object.assign({}, colaLayout, {
                            fit: !!fitView,
                            stop: function () { safeFit(); }
                        });
                        cy.layout(opts).run();
                    } catch (err) {
                        try {
                            cy.layout({
                                name: 'cose',
                                animate: true,
                                fit: !!fitView,
                                padding: 40,
                                stop: function () { safeFit(); }
                            }).run();
                        } catch (_) { }
                    }
                }

                // Debounced re-fit on burst node additions (typical during
                // subnet expansion: 20 hosts may arrive in <100 ms).
                var fitDebounceTimer = null;
                cy.on('add', function () {
                    if (fitDebounceTimer) clearTimeout(fitDebounceTimer);
                    fitDebounceTimer = setTimeout(function () {
                        safeFit();
                        fitDebounceTimer = null;
                    }, 300);
                });

                // Re-fit on window/canvas resize (user dragging window edge).
                var resizeDebounceTimer = null;
                window.addEventListener('resize', function () {
                    if (resizeDebounceTimer) clearTimeout(resizeDebounceTimer);
                    resizeDebounceTimer = setTimeout(function () {
                        safeFit();
                        resizeDebounceTimer = null;
                    }, 200);
                });

                function normalizeElements(raw) {
                    if (!raw) return { nodes: [], edges: [] };
                    if (Array.isArray(raw)) {
                        return { nodes: raw.filter(function (e) { return e && e.data && !('source' in e.data); }),
                                 edges: raw.filter(function (e) { return e && e.data && ('source' in e.data); }) };
                    }
                    var nodes = [];
                    var edges = [];
                    if (Array.isArray(raw.nodes)) {
                        raw.nodes.forEach(function (n) {
                            nodes.push(n.data ? n : { data: n });
                        });
                    }
                    if (Array.isArray(raw.edges)) {
                        raw.edges.forEach(function (e) {
                            edges.push(e.data ? e : { data: e });
                        });
                    }
                    return { nodes: nodes, edges: edges };
                }

                function updateStatusbarCounts() {
                    var bar = document.getElementById('statusbar');
                    if (!bar) return;
                    var n = cy.nodes().length;
                    var e = cy.edges().length;
                    bar.textContent = n + ' nodes  ' + e + ' edges';
                }

                function handleInit(payload) {
                    try {
                        cy.elements().remove();
                        var parts = normalizeElements(payload);
                        if (parts.nodes.length) cy.add(parts.nodes);
                        if (parts.edges.length) cy.add(parts.edges);
                        logToHost('init-added', { nodes: cy.nodes().length, edges: cy.edges().length });
                        runLayout(true);
                        logToHost('init-layout-done', { viewport: { w: cy.width(), h: cy.height() } });
                        updateStatusbarCounts();
                    } catch (e) {
                        logToHost('error', { where: 'handleInit', msg: e.message, stack: e.stack });
                    }
                }

                function handleUpsert(payload) {
                    try {
                        var parts = normalizeElements(payload);
                        var added = false;

                        function upsertOne(el) {
                            if (!el || !el.data || !el.data.id) return;
                            var existing = cy.getElementById(el.data.id);
                            var existed = existing && existing.length > 0;
                            logToHost('upsert-el', {
                                id: el.data.id,
                                type: el.data.type,
                                stale: el.data.stale,
                                staleType: typeof el.data.stale,
                                existed: existed
                            });
                            if (existed) {
                                existing.data(el.data);
                            } else {
                                cy.add(el);
                                added = true;
                            }
                            var postNode = cy.getElementById(el.data.id);
                            if (postNode && postNode.length > 0) {
                                logToHost('upsert-postdata', {
                                    id: el.data.id,
                                    staleOnNode: postNode.data('stale'),
                                    borderStyle: postNode.style('border-style')
                                });
                            }
                        }

                        parts.nodes.forEach(upsertOne);
                        parts.edges.forEach(upsertOne);

                        logToHost('upsert-added', { addedAny: added, total: cy.nodes().length });
                        if (added) runLayout(false);
                        updateStatusbarCounts();
                    } catch (e) {
                        logToHost('error', { where: 'handleUpsert', msg: e.message, stack: e.stack });
                    }
                }

                function handleMessage(raw) {
                    try {
                        if (raw == null) return;
                        var msg = raw;
                        if (typeof msg === 'string') {
                            try { msg = JSON.parse(msg); } catch (err) { return; }
                        }
                        if (!msg || !msg.type) return;

                        var count = 0;
                        if (msg.elements) {
                            if (Array.isArray(msg.elements)) count = msg.elements.length;
                            else if (Array.isArray(msg.elements.nodes) || Array.isArray(msg.elements.edges)) {
                                count = (msg.elements.nodes ? msg.elements.nodes.length : 0)
                                      + (msg.elements.edges ? msg.elements.edges.length : 0);
                            }
                        }
                        logToHost('msg-in', { type: msg.type, count: count });

                        switch (msg.type) {
                            case 'init':
                                handleInit(msg.elements);
                                break;
                            case 'upsert':
                                handleUpsert(msg.elements);
                                break;
                            case 'clear':
                                cy.elements().remove();
                                updateStatusbarCounts();
                                break;
                            case 'status':
                                var bar = document.getElementById('statusbar');
                                if (bar) bar.textContent = msg.text || '';
                                break;
                            case 'theme':
                                document.body.className = msg.value === 'Light'
                                    ? 'light' : '';
                                if (window.cy) {
                                    try {
                                        window.cy.style()
                                            .selector('core')
                                            .style('background-color',
                                                msg.value === 'Light' ? '#f8fafc' : '#080c14')
                                            .update();
                                    } catch (_) { }
                                }
                                break;
                            case 'select':
                                if (msg.id) {
                                    cy.elements().unselect();
                                    var target = cy.getElementById(msg.id);
                                    if (target && target.length > 0) {
                                        target.select();
                                        cy.animate({ center: { eles: target }, duration: 200 });
                                    }
                                }
                                break;
                            case 'recenter':
                                safeFit();
                                break;
                        }
                    } catch (e) {
                        logToHost('error', { where: 'handleMessage', msg: e.message, stack: e.stack });
                    }
                }

                if (window.chrome && window.chrome.webview && window.chrome.webview.addEventListener) {
                    window.chrome.webview.addEventListener('message', function (event) {
                        handleMessage(event.data);
                    });
                }

                // Selection semantics — defer to cytoscape 3.x native modifier
                // handling rather than fight it (the framework hardcodes Shift
                // as the additive modifier in its internal tap-state machine,
                // which fires before user `tap` listeners):
                //   plain click  → clear all, select only the clicked node
                //   Shift+click  → cytoscape native: toggle this node in/out
                //                  of selection. Handler does NOT touch
                //                  selection, only emits a nodeClick post so
                //                  the detail panel updates with last clicked.
                //   Shift+drag   → cytoscape native box-select rectangle.
                //   Ctrl/Cmd     → DEAD: handler returns early, no mutation,
                //                  no IPC, no detail-panel update.
                cy.on('tap', 'node', function (evt) {
                    var ne = evt.originalEvent;
                    var node = evt.target;

                    // Ctrl/Cmd is dead — eat the tap entirely.
                    if (ne && (ne.ctrlKey || ne.metaKey)) {
                        return;
                    }

                    if (ne && ne.shiftKey) {
                        // Cytoscape's native additive-select already toggled
                        // this node. Don't touch selection — just emit the
                        // click event so the detail panel reflects the most
                        // recently tapped node in the multi-selection.
                        postToHost({
                            event: 'nodeClick',
                            id: node.id(),
                            type: node.data('type'),
                            ip: node.data('ip') || '',
                            subnet: node.data('subnet') || node.data('network') || '',
                            expanded: node.data('expanded') || false
                        });
                        return;
                    }

                    // Plain click: clear all, select only this.
                    cy.elements().unselect();
                    node.select();

                    postToHost({
                        event: 'nodeClick',
                        id: node.id(),
                        type: node.data('type'),
                        ip: node.data('ip') || '',
                        subnet: node.data('subnet') || node.data('network') || '',
                        expanded: node.data('expanded') || false
                    });
                });

                // Background tap:
                //   plain    → deselect all
                //   Shift    → defer (user may be building a multi-selection
                //              and missed a node — don't reset their work)
                //   Ctrl/Cmd → dead, do nothing
                cy.on('tap', function (evt) {
                    var ne = evt.originalEvent;
                    if (ne && (ne.ctrlKey || ne.metaKey)) return;
                    if (ne && ne.shiftKey) return;
                    if (evt.target === cy) {
                        cy.elements().unselect();
                    }
                });

                // Box-select summary: cytoscape fires boxselect once per node
                // added by a Shift+drag rectangle. Coalesce a burst of fires
                // into one IPC message so the WPF status chip can show
                // "Selected N nodes" without spamming.
                var boxSelectCount = 0;
                var boxSelectTimer = null;
                cy.on('boxselect', 'node', function () {
                    boxSelectCount++;
                    if (boxSelectTimer) clearTimeout(boxSelectTimer);
                    boxSelectTimer = setTimeout(function () {
                        postToHost({
                            event: 'boxSelectComplete',
                            count: boxSelectCount
                        });
                        boxSelectCount = 0;
                        boxSelectTimer = null;
                    }, 150);
                });

                cy.on('tap', 'edge', function (evt) {
                    var edge = evt.target;
                    postToHost({
                        event: 'edgeClick',
                        id: edge.id(),
                        source: edge.data('source'),
                        target: edge.data('target'),
                        protocol: edge.data('protocol') || '',
                        bytes: edge.data('bytes') || 0
                    });
                });

                cy.on('cxttap', 'node', function (evt) {
                    var node = evt.target;

                    // Build the bulk-IP list from the current selection.
                    // Only forward node types that ProbeHostAsync can actually
                    // hit — exclude SubnetCloud and label-only LLDP nodes.
                    var probeable = function (t) {
                        return t === 'Host' || t === 'Self' ||
                               t === 'Gateway' || t === 'UnknownHop' ||
                               t === 'RemoteHost';
                    };

                    // Explicit forEach + push into a plain JS array — don't rely
                    // on Cytoscape Collection.map() serializing cleanly across
                    // the WebView2 bridge.
                    var sel = cy.$('node:selected');
                    var selectedIps = [];
                    sel.forEach(function (n) {
                        var ip = n.data('ip') || '';
                        if (ip && probeable(n.data('type'))) {
                            selectedIps.push(ip);
                        }
                    });
                    logToHost('cxttap-selection', {
                        rightClickedId: node.id(),
                        cySelectedCount: sel.length,
                        probeableSelectedCount: selectedIps.length,
                        sample: selectedIps.slice(0, 5)
                    });

                    postToHost({
                        event: 'nodeRightClick',
                        id: node.id(),
                        type: node.data('type'),
                        ip: node.data('ip') || '',
                        subnet: node.data('subnet') || node.data('network') || '',
                        selectedIps: selectedIps,
                        // Belt-and-suspenders: report JS-side length so the C#
                        // parser can detect any deserialization drop-off.
                        selectedIpsCount: selectedIps.length
                    });
                });

                postToHost({ event: 'ready' });
                logToHost('script-init-complete', {
                    cyExists: typeof cy !== 'undefined',
                    listenerRegistered: true
                });
            } catch (e) {
                logToHost('error', { where: 'iife', msg: e.message, stack: e.stack });
            }
        })();
    </script>
</body>
</html>
